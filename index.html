<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoba Renshyu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>ことば<span class="header-accent">練習</span></h1>
        <nav class="header-nav">
            <button class="nav-btn active" id="nav-batch">Study</button>
            <button class="nav-btn" id="nav-list">All Words</button>
        </nav>
    </header>

    <!-- ── Batch View ── -->
    <main id="batch-view">
        <div class="batch-bar">
            <div class="batch-progress">
                <span id="progress-text">0 learned</span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
            <label class="batch-size-label">
                Batch
                <input type="number" id="batch-size" min="1" max="50" value="3">
            </label>
        </div>

        <div class="word-list" id="word-list"></div>

        <div class="skipped-section" id="skipped-section" style="display: none;">
            <button class="skipped-toggle" id="skipped-toggle">Skipped words (0)</button>
            <div class="skipped-list" id="skipped-list"></div>
        </div>
    </main>

    <!-- ── Lesson View ── -->
    <div id="lesson-view" style="display: none;">
        <div class="lesson-container">
            <button class="back-btn" id="back-btn">&larr; Back to batch</button>
            <div class="lesson-header">
                <div class="lesson-kanji" id="lesson-kanji"></div>
                <div class="lesson-reading" id="lesson-kana"></div>
                <div class="lesson-meaning" id="lesson-meaning"></div>
                <div class="lesson-tags" id="lesson-tags"></div>
            </div>
            <div class="lesson-content" id="lesson-content"></div>
            <div class="lesson-actions">
                <button class="action-btn action-skip" id="skip-btn">Skip for now</button>
                <button class="action-btn action-learned" id="learned-btn">I know this</button>
            </div>
        </div>
    </div>

    <!-- ── Full List View ── -->
    <div id="full-list-view" style="display: none;">
        <div class="list-container">
            <div class="list-header">
                <h2>All Words</h2>
                <span class="list-count" id="list-count"></span>
            </div>
            <div class="full-list" id="full-list"></div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
