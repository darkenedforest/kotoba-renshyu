<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoba Renshyu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ── Lesson overlay ── -->
    <div id="lesson-overlay" class="overlay" style="display:none;">
        <div class="overlay-content">
            <button class="overlay-close" id="lesson-close">&times;</button>
            <div class="lesson-hero" id="lesson-hero">
                <div class="lesson-hero-kanji" id="lesson-kanji"></div>
                <div class="lesson-hero-kana" id="lesson-kana"></div>
                <div class="lesson-hero-meaning" id="lesson-meaning"></div>
                <div class="lesson-hero-tags" id="lesson-tags"></div>
            </div>
            <div class="lesson-body" id="lesson-content"></div>
            <div class="lesson-footer">
                <button class="btn btn-skip" id="skip-btn">Skip</button>
                <button class="btn btn-learned" id="learned-btn">Got it!</button>
            </div>
        </div>
    </div>

    <!-- ── Settings overlay ── -->
    <div id="settings-overlay" class="overlay" style="display:none;">
        <div class="overlay-content overlay-narrow">
            <button class="overlay-close" id="settings-close">&times;</button>
            <h2 class="settings-title">Settings</h2>
            <div class="setting-row">
                <div>
                    <div class="setting-label">Batch size</div>
                    <div class="setting-desc">Words shown at a time on the path</div>
                </div>
                <input type="number" id="batch-size" class="setting-input" min="1" max="50" value="3">
            </div>
            <div class="setting-row">
                <div>
                    <div class="setting-label">Reset progress</div>
                    <div class="setting-desc">Start over from scratch</div>
                </div>
                <button class="btn btn-danger" id="reset-btn">Reset</button>
            </div>
        </div>
    </div>

    <!-- ── Main app ── -->
    <div id="app">
        <!-- Top bar -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="app-logo">ことば<span class="logo-accent">練習</span></span>
            </div>
            <div class="topbar-stats">
                <div class="stat">
                    <span class="stat-num" id="stat-learned">0</span>
                    <span class="stat-label">Learned</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="stat-remaining">0</span>
                    <span class="stat-label">Remaining</span>
                </div>
            </div>
        </div>

        <!-- Page: Path -->
        <div id="page-path" class="page active">
            <div class="path-container" id="path-container"></div>
        </div>

        <!-- Page: List -->
        <div id="page-list" class="page">
            <div class="list-container">
                <div class="list-toolbar">
                    <h2>All Words</h2>
                    <div class="list-filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="learned">Learned</button>
                        <button class="filter-btn" data-filter="skipped">Skipped</button>
                    </div>
                </div>
                <div class="word-table" id="word-table"></div>
            </div>
        </div>

        <!-- Bottom nav -->
        <nav class="bottom-nav">
            <button class="bnav-btn active" data-page="path">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="14"/><circle cx="12" cy="19" r="3"/><path d="M12 14c-4 0-4 5-8 5"/><path d="M12 14c4 0 4 5 8 5"/></svg>
                <span>Path</span>
            </button>
            <button class="bnav-btn" data-page="list">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
                <span>List</span>
            </button>
            <button class="bnav-btn" id="nav-settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
