<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kotoba Renshyu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" href="data:,">
</head>
<body>
    <!-- ── Lesson sheet ── -->
    <div id="lesson-sheet" class="sheet" style="display:none;">
        <div class="sheet-inner">
            <button class="sheet-close" id="lesson-close">&times;</button>
            <div class="lesson-hero" id="lesson-hero">
                <div id="lesson-kanji" class="hero-kanji"></div>
                <div id="lesson-kana" class="hero-kana"></div>
                <div id="lesson-meaning" class="hero-meaning"></div>
                <div id="lesson-tags" class="hero-tags"></div>
            </div>
            <div id="lesson-content" class="lesson-body"></div>
            <div class="lesson-btns">
                <button class="btn btn-ghost" id="skip-btn">Skip</button>
                <button class="btn btn-green" id="learned-btn">Got it!</button>
            </div>
        </div>
    </div>

    <!-- ── Batch sheet (list of words in a batch) ── -->
    <div id="batch-sheet" class="sheet" style="display:none;">
        <div class="sheet-inner">
            <button class="sheet-close" id="batch-close">&times;</button>
            <div class="batch-sheet-header">
                <h2 id="batch-sheet-title">Batch 1</h2>
                <p id="batch-sheet-sub" class="batch-sub"></p>
            </div>
            <div id="batch-word-list" class="batch-words"></div>
        </div>
    </div>

    <!-- ── Settings sheet ── -->
    <div id="settings-sheet" class="sheet" style="display:none;">
        <div class="sheet-inner sheet-narrow">
            <button class="sheet-close" id="settings-close">&times;</button>
            <h2 class="sheet-title">Settings</h2>
            <div class="setting-row">
                <div>
                    <div class="setting-name">Batch size</div>
                    <div class="setting-hint">Words per batch on the path</div>
                </div>
                <input type="number" id="batch-size" class="setting-num" min="1" max="50" value="3">
            </div>
            <div class="setting-row">
                <div>
                    <div class="setting-name">Reset progress</div>
                    <div class="setting-hint">Start over from the beginning</div>
                </div>
                <button class="btn btn-red-sm" id="reset-btn">Reset</button>
            </div>
        </div>
    </div>

    <!-- ── App shell ── -->
    <div id="app">
        <div class="topbar">
            <span class="logo">ことば<span class="logo-hl">練習</span></span>
            <div class="topbar-right">
                <div class="pill pill-green"><span id="stat-learned">0</span> learned</div>
                <div class="pill pill-blue"><span id="stat-remaining">0</span> to go</div>
            </div>
        </div>

        <div id="page-path" class="page active">
            <div class="path-scroll">
                <svg id="path-svg" class="path-svg"></svg>
                <div id="path-nodes" class="path-nodes"></div>
            </div>
        </div>

        <div id="page-list" class="page">
            <div class="list-wrap">
                <div class="list-bar">
                    <h2>All Words</h2>
                    <div class="filter-pills">
                        <button class="fpill active" data-filter="all">All</button>
                        <button class="fpill" data-filter="learned">Learned</button>
                        <button class="fpill" data-filter="skipped">Skipped</button>
                    </div>
                </div>
                <div id="word-table" class="word-table"></div>
            </div>
        </div>

        <nav class="tab-bar">
            <button class="tab active" data-page="path">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span>Lessons</span>
            </button>
            <button class="tab" data-page="list">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
                <span>List</span>
            </button>
            <button class="tab" id="tab-settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
